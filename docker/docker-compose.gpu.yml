# GPU Override for Docker Compose
# Usage: docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up

version: '3.8'

services:
  pipeline:
    build:
      dockerfile: docker/Dockerfile.gpu
    
    # Enable GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all  # or specify: count: 1
              capabilities: [gpu]
    
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0

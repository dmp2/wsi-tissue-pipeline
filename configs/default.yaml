# WSI Tissue Pipeline - Default Configuration
# ============================================
# This file contains all default settings for the pipeline.
# Copy and modify for your specific use case.

# Segmentation settings for tissue detection
segmentation:
  # Backend algorithm: "local-entropy", "local-otsu", "tiatoolbox", "pathml"
  backend: "local-entropy"
  
  # Target size for thumbnail used in segmentation (longest side in pixels)
  target_long_side: 2000
  
  # Minimum area in pixels for a valid tissue region (at thumbnail scale)
  min_area_px: 500
  
  # Structuring element size for morphological operations
  struct_elem_px: 5

  # Optional H&E brightfield stain gate before morphology
  stain_gate: false
  stain_gate_mode: "fixed"
  stain_min_saturation: 0.08
  stain_min_od: 0.35
  stain_min_he_signal: 0.0
  stain_od_bg_percentile: 0.80
  stain_od_mad_multiplier: 4.0
  stain_pre_open_px: 0
  
  # Whether to split touching tissue sections
  split_touching: true
  
  # Watershed seed erosion radius for splitting touching components
  r_split: 3

  # Optional safety-net: keep only the largest K components when expected count is known
  keep_top_k: null

  # Optional H&E-aware cleanup for low-stain peripheral appendages
  appendage_refinement_enabled: false
  appendage_refinement_mode: "trim"
  appendage_refinement_profile: "he_sections"

  # Component-level artifact QC after segmentation
  component_qc_enabled: true
  component_qc_mode: "annotate"
  component_qc_profile: "he_sections"

# Tile extraction settings
tiles:
  # Chunk size for dask processing
  chunk_size: 4096
  
  # Pad output to multiple of this value (for GPU optimization)
  pad_multiple: 16
  
  # Extra margin around detected tissue (pixels at full resolution)
  extra_margin_px: 0

# Output format settings
output:
  # Output format: "ome-zarr", "tiff", or "both"
  format: "ome-zarr"
  
  # Compression codec: "zlib", "blosc", "lz4", null
  compression: "zlib"
  
  # Convert to uint8 (from uint16) to save space
  convert_to_uint8: true
  
  # Generate QC images during processing
  generate_qc: true

# MLflow experiment tracking settings
mlflow:
  # Enable/disable MLflow tracking
  enabled: true
  
  # Tracking server URI (local SQLite by default)
  tracking_uri: "sqlite:///mlflow.db"
  
  # Experiment name for organizing runs
  experiment_name: "wsi-tissue-pipeline"
  
  # Template for run names (supports {specimen}, {timestamp})
  run_name_template: "{specimen}_{timestamp}"
  
  # Whether to log artifacts (output files)
  log_artifacts: false

# Google Colab specific settings (only used in Colab environment)
colab:
  # Mount Google Drive for data access
  mount_drive: true
  
  # Use GPU if available
  use_gpu: true
  
  # Install dependencies automatically
  install_dependencies: true
